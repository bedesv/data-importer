version: 2
updates:

  # GitHub Actions used by the workflows in .github/workflows
  - package-ecosystem: "github-actions"
    directory: "/"
    target-branch: dev
    schedule:
      interval: "weekly"

  # PHP / Composer dependencies
  - package-ecosystem: "composer"
    directory: "/"
    target-branch: dev
    versioning-strategy: increase
    schedule:
      interval: "weekly"

  # JS dependencies (npm workspace)
  - package-ecosystem: "npm"
    directory: "/"
    target-branch: dev
    versioning-strategy: increase
    schedule:
      interval: "weekly"

  # Base images in the Dockerfiles
  - package-ecosystem: "docker"
    directory: "/"
    target-branch: dev
    schedule:
      interval: "weekly"
