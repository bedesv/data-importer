services:
  importer:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: firefly-importer-dev
    ports:
      - "8081:8080"
    volumes:
      # Mount the entire project for live development
      - .:/var/www/html
      # Keep dependency and build directories inside the container.
      - /var/www/html/vendor
      - /var/www/html/node_modules
      - /var/www/html/resources/js/v2/node_modules
      - /var/www/html/public/build
      # Mount storage for persistence
      - ./storage:/var/www/html/storage
    environment:
      - APP_ENV=local
      - APP_DEBUG=true
      - LOG_LEVEL=debug
      - FIREFLY_III_URL=${FIREFLY_III_URL:-}
      - FIREFLY_III_ACCESS_TOKEN=${FIREFLY_III_ACCESS_TOKEN:-}
      - FIREFLY_III_CLIENT_ID=${FIREFLY_III_CLIENT_ID:-}
      - VANITY_URL=${VANITY_URL:-}
      - NORDIGEN_ID=${NORDIGEN_ID:-}
      - NORDIGEN_KEY=${NORDIGEN_KEY:-}
      - SPECTRE_APP_ID=${SPECTRE_APP_ID:-}
      - SPECTRE_SECRET=${SPECTRE_SECRET:-}
      - SIMPLEFIN_TOKEN=${SIMPLEFIN_TOKEN:-}
      - AKAHU_APP_TOKEN=${AKAHU_APP_TOKEN:-}
      - AKAHU_USER_TOKEN=${AKAHU_USER_TOKEN:-}
      - AKAHU_INTERNAL_ACCOUNT_PREFIX=${AKAHU_INTERNAL_ACCOUNT_PREFIX:-}
      - AKAHU_MORTGAGE_PAYMENT_PATTERN=${AKAHU_MORTGAGE_PAYMENT_PATTERN:-}
      - AKAHU_CONNECTION_TIMEOUT=${AKAHU_CONNECTION_TIMEOUT:-30}
      - AKAHU_STALE_REFRESH_HOURS=${AKAHU_STALE_REFRESH_HOURS:-2}
      - AKAHU_REFRESH_POLL_SECONDS=${AKAHU_REFRESH_POLL_SECONDS:-10}
      - AKAHU_REFRESH_WAIT_TIMEOUT_SECONDS=${AKAHU_REFRESH_WAIT_TIMEOUT_SECONDS:-180}
      - VERIFY_TLS_SECURITY=${VERIFY_TLS_SECURITY:-true}
      - TRUSTED_PROXIES=**
      - TZ=${TZ:-UTC}
    networks:
      - firefly-network
    restart: unless-stopped

networks:
  firefly-network:
    driver: bridge
